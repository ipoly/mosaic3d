<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mosaic 3D</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    #canvas-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 0;
      position: relative;
    }
    #canvas-container canvas {
      cursor: grab;
      touch-action: none;
    }
    #canvas-container canvas:active {
      cursor: grabbing;
    }
    .drag-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.5s;
    }
    .drag-hint.hidden {
      opacity: 0;
    }
    #thumbnails {
      display: flex;
      gap: 8px;
      padding: 12px;
      flex-wrap: nowrap;
      justify-content: center;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .thumb {
      width: 40px;
      height: 40px;
      object-fit: cover;
      cursor: pointer;
      border-radius: 6px;
      padding: 4px;
      background: #e0e0e0;
      opacity: 0.6;
      transition: all 0.2s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .thumb:hover {
      opacity: 0.85;
    }
    .thumb.active {
      opacity: 1;
      box-shadow: 0 0 0 2px #fff;
    }

    /* Tablet - 768px */
    @media (max-width: 768px) {
      .thumb { width: 48px; height: 48px; padding: 3px; }
      #thumbnails { gap: 12px; padding: 10px 16px; }
      .drag-hint { font-size: 13px; padding: 6px 12px; bottom: 16px; }
    }

    /* Phone - 480px */
    @media (max-width: 480px) {
      .thumb { width: 44px; height: 44px; padding: 2px; }
      #thumbnails { gap: 10px; padding: 8px 12px; }
    }

    /* Touch device feedback */
    @media (hover: none) and (pointer: coarse) {
      .thumb { transition: transform 0.15s, opacity 0.2s; }
      .thumb:active { transform: scale(0.92); opacity: 1; }
      .thumb:hover { opacity: 0.6; }
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div class="drag-hint">Drag or tap to interact</div>
  </div>
  <div id="thumbnails"></div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
